#
# tuned profile: legion-balanced-battery
# Optimizado para Lenovo Legion 5 Pro Gen 8 (R9 7945HX + RTX 4070)
# Balance moderado — enchufado con ahorro o batería con rendimiento aceptable
#
[main]
summary=Legion - balance moderado (batería con rendimiento)
include=balanced

[cpu]
governor=schedutil
energy_performance_preference=balance_power
boost=1

[acpi]
platform_profile=balanced

[audio]
timeout=10

[video]
panel_power_savings=2

[disk]
devices=nvme*
apm=192

[sysctl]
kernel.nmi_watchdog=0
vm.swappiness=10
vm.dirty_writeback_centisecs=1000
vm.laptop_mode=2

[script]
script=${i:PROFILE_DIR}/script.sh
