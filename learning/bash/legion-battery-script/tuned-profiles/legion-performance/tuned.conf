#
# tuned profile: legion-performance
# Optimizado para Lenovo Legion 5 Pro Gen 8 (R9 7945HX + RTX 4070)
# Máximo rendimiento — gaming y workstation
#
[main]
summary=Legion - máximo rendimiento (gaming/workstation)
include=balanced

[cpu]
governor=performance
energy_performance_preference=performance
boost=1
min_perf_pct=100

[acpi]
platform_profile=performance

[audio]
timeout=0

[video]
panel_power_savings=0

[disk]
devices=nvme*
apm=254
readahead=>4096

[sysctl]
kernel.nmi_watchdog=0
vm.swappiness=10
vm.dirty_bytes=536870912
vm.dirty_background_bytes=134217728

[script]
script=${i:PROFILE_DIR}/script.sh
